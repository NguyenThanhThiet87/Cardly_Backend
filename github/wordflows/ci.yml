name: Continuous Integration (CI)

# 1. Trigger: Kích hoạt pipeline khi có người push code vào nhánh main
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    # 2. Runner: Sử dụng máy ảo Ubuntu mới nhất của GitHub
    runs-on: ubuntu-latest

    steps:
    # Bước 1: Kéo mã nguồn từ kho GitHub về máy ảo Runner
    - name: Checkout source code
      uses: actions/checkout@v4

    # Bước 2: Thiết lập Docker Buildx (Công cụ build Docker nâng cao của GitHub)
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # Bước 3: Cấu hình Caching cho các layer Docker để tăng tốc độ build ở các lần sau
    - name: Cache Docker layers
      uses: actions/cache@v4
      with:
        path: /tmp/.buildx-cache
        key: ${{ runner.os }}-buildx-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-buildx-

    # Bước 4: Thực hiện chạy các bài Unit Test (Nếu ứng dụng của bạn có viết test)
    # Ví dụ với ứng dụng .NET: RUN dotnet test (được định nghĩa bên trong Dockerfile nếu có)
    
    # Bước 5: Build thử nghiệm Docker Image xem có bị lỗi biên dịch (compile) không
    - name: Build Docker Image (Dry Run Test)
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: false # Ngày 6 chỉ test build, CHƯA đẩy lên Artifact Registry (việc của Ngày 7)
        tags: my-backend-app:latest
        cache-from: type=local,src=/tmp/.buildx-cache
        cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

    # Bước 6: Cập nhật lại bộ nhớ đệm Cache
    - name: Move cache
      run: |
        rm -rf /tmp/.buildx-cache
        mv /tmp/.buildx-cache-new /tmp/.buildx-cache